# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# Requires any package version to have been published for at least 1 day
# before pnpm allows installing it. Malicious npm releases are typically
# discovered and pulled within hours, so a 1-day delay is a strong safeguard.
#
# DO NOT DISABLE. See the original project docs for rationale.
# ============================================================================
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

packages:
  - apps/*
  - lib/*
  - lib/integrations/*
  - scripts

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@testing-library/jest-dom': ^6.6.3
  '@testing-library/react': ^16.2.0
  '@testing-library/user-event': ^14.5.2
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  jsdom: ^26.0.0
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  supertest: ^7.0.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vitest: ^3.2.2
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  esbuild: "0.27.3"
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
