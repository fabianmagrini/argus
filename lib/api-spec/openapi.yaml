openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Engineering Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: teams
    description: Team management
  - name: repositories
    description: Repository management
  - name: deployments
    description: Deployment tracking
  - name: pull-requests
    description: Pull request tracking
  - name: incidents
    description: Incident tracking
  - name: events
    description: Raw event ingestion
  - name: metrics
    description: Aggregated analytics metrics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Teams ────────────────────────────────────────────────────────────────
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Repositories ─────────────────────────────────────────────────────────
  /repositories:
    get:
      operationId: listRepositories
      tags: [repositories]
      summary: List all repositories
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repository"
    post:
      operationId: createRepository
      tags: [repositories]
      summary: Register a repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepositoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"

  /repositories/{id}:
    get:
      operationId: getRepository
      tags: [repositories]
      summary: Get a repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRepository
      tags: [repositories]
      summary: Update a repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepositoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
    delete:
      operationId: deleteRepository
      tags: [repositories]
      summary: Delete a repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Deployments ──────────────────────────────────────────────────────────
  /deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List deployments
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: repositoryId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, success, failed, rolled_back]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
    post:
      operationId: createDeployment
      tags: [deployments]
      summary: Record a deployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /deployments/{id}:
    get:
      operationId: getDeployment
      tags: [deployments]
      summary: Get a deployment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDeployment
      tags: [deployments]
      summary: Update deployment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  # ─── Pull Requests ────────────────────────────────────────────────────────
  /pull-requests:
    get:
      operationId: listPullRequests
      tags: [pull-requests]
      summary: List pull requests
      parameters:
        - name: repositoryId
          in: query
          schema:
            type: integer
        - name: teamId
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
            enum: [open, merged, closed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of pull requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PullRequest"
    post:
      operationId: createPullRequest
      tags: [pull-requests]
      summary: Record a pull request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequest"

  /pull-requests/{id}:
    get:
      operationId: getPullRequest
      tags: [pull-requests]
      summary: Get a pull request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pull request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePullRequest
      tags: [pull-requests]
      summary: Update a pull request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullRequestUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequest"

  # ─── Incidents ────────────────────────────────────────────────────────────
  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: severity
          in: query
          schema:
            type: string
            enum: [p1, p2, p3, p4]
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Record an incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get an incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateIncident
      tags: [incidents]
      summary: Update an incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  # ─── Event Ingestion ──────────────────────────────────────────────────────
  /events:
    post:
      operationId: ingestEvent
      tags: [events]
      summary: Ingest a raw activity event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    get:
      operationId: listEvents
      tags: [events]
      summary: List recent events
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  # ─── Analytics / Metrics ─────────────────────────────────────────────────
  /metrics/summary:
    get:
      operationId: getMetricsSummary
      tags: [metrics]
      summary: Overall dashboard summary with key KPIs
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSummary"

  /metrics/dora:
    get:
      operationId: getDoraMetrics
      tags: [metrics]
      summary: DORA four-key metrics
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: DORA metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoraMetrics"

  /metrics/dora/timeseries:
    get:
      operationId: getDoraTimeseries
      tags: [metrics]
      summary: DORA metrics as daily time-series data
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
        - name: metric
          in: query
          schema:
            type: string
            enum: [deployment_frequency, lead_time, change_failure_rate, recovery_time]
      responses:
        "200":
          description: Time-series data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeseriesPoint"

  /metrics/flow:
    get:
      operationId: getFlowMetrics
      tags: [metrics]
      summary: Flow metrics - cycle time, throughput, WIP
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Flow metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowMetrics"

  /metrics/team-health:
    get:
      operationId: getTeamHealthMetrics
      tags: [metrics]
      summary: Team health indicators per team
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Team health breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamHealthMetrics"

  /metrics/activity:
    get:
      operationId: getActivityFeed
      tags: [metrics]
      summary: Recent activity feed across all teams
      parameters:
        - name: teamId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /metrics/leaderboard:
    get:
      operationId: getTeamLeaderboard
      tags: [metrics]
      summary: Team performance leaderboard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Team leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Teams ─────────────────────────────────────────────────────────────
    Team:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        timezone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        timezone:
          type: string

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        timezone:
          type: string

    # ── Repositories ──────────────────────────────────────────────────────
    Repository:
      type: object
      required: [id, name, fullName, createdAt]
      properties:
        id:
          type: integer
        teamId:
          type: ["integer", "null"]
        name:
          type: string
        fullName:
          type: string
        url:
          type: ["string", "null"]
        defaultBranch:
          type: string
        language:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    RepositoryInput:
      type: object
      required: [name, fullName]
      properties:
        teamId:
          type: integer
        name:
          type: string
        fullName:
          type: string
        url:
          type: string
        defaultBranch:
          type: string
        language:
          type: string

    RepositoryUpdate:
      type: object
      properties:
        teamId:
          type: integer
        name:
          type: string
        url:
          type: string
        defaultBranch:
          type: string
        language:
          type: string

    # ── Deployments ───────────────────────────────────────────────────────
    Deployment:
      type: object
      required: [id, repositoryId, environment, status, deployedAt]
      properties:
        id:
          type: integer
        repositoryId:
          type: integer
        teamId:
          type: ["integer", "null"]
        environment:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed, rolled_back]
        commitSha:
          type: ["string", "null"]
        version:
          type: ["string", "null"]
        leadTimeSeconds:
          type: ["integer", "null"]
        deployedAt:
          type: string
          format: date-time
        finishedAt:
          type: ["string", "null"]

    DeploymentInput:
      type: object
      required: [repositoryId, environment, status]
      properties:
        repositoryId:
          type: integer
        teamId:
          type: integer
        environment:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed, rolled_back]
        commitSha:
          type: string
        version:
          type: string
        leadTimeSeconds:
          type: integer
        deployedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time

    DeploymentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, running, success, failed, rolled_back]
        leadTimeSeconds:
          type: integer
        finishedAt:
          type: string
          format: date-time

    # ── Pull Requests ─────────────────────────────────────────────────────
    PullRequest:
      type: object
      required: [id, repositoryId, title, state, openedAt]
      properties:
        id:
          type: integer
        repositoryId:
          type: integer
        teamId:
          type: ["integer", "null"]
        externalId:
          type: ["integer", "null"]
        title:
          type: string
        authorLogin:
          type: ["string", "null"]
        state:
          type: string
          enum: [open, merged, closed]
        additions:
          type: ["integer", "null"]
        deletions:
          type: ["integer", "null"]
        changedFiles:
          type: ["integer", "null"]
        cycleTimeSeconds:
          type: ["integer", "null"]
        openedAt:
          type: string
          format: date-time
        mergedAt:
          type: ["string", "null"]
        closedAt:
          type: ["string", "null"]

    PullRequestInput:
      type: object
      required: [repositoryId, title, state, openedAt]
      properties:
        repositoryId:
          type: integer
        teamId:
          type: integer
        externalId:
          type: integer
        title:
          type: string
        authorLogin:
          type: string
        state:
          type: string
          enum: [open, merged, closed]
        additions:
          type: integer
        deletions:
          type: integer
        changedFiles:
          type: integer
        cycleTimeSeconds:
          type: integer
        openedAt:
          type: string
          format: date-time
        mergedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time

    PullRequestUpdate:
      type: object
      properties:
        state:
          type: string
          enum: [open, merged, closed]
        additions:
          type: integer
        deletions:
          type: integer
        changedFiles:
          type: integer
        cycleTimeSeconds:
          type: integer
        mergedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time

    # ── Incidents ─────────────────────────────────────────────────────────
    Incident:
      type: object
      required: [id, title, severity, status, openedAt]
      properties:
        id:
          type: integer
        teamId:
          type: ["integer", "null"]
        title:
          type: string
        severity:
          type: string
          enum: [p1, p2, p3, p4]
        status:
          type: string
          enum: [open, resolved]
        recoveryTimeSeconds:
          type: ["integer", "null"]
        openedAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]

    IncidentInput:
      type: object
      required: [title, severity, status, openedAt]
      properties:
        teamId:
          type: integer
        title:
          type: string
        severity:
          type: string
          enum: [p1, p2, p3, p4]
        status:
          type: string
          enum: [open, resolved]
        recoveryTimeSeconds:
          type: integer
        openedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time

    IncidentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [open, resolved]
        severity:
          type: string
          enum: [p1, p2, p3, p4]
        recoveryTimeSeconds:
          type: integer
        resolvedAt:
          type: string
          format: date-time

    # ── Events ────────────────────────────────────────────────────────────
    Event:
      type: object
      required: [id, type, occurredAt]
      properties:
        id:
          type: integer
        teamId:
          type: ["integer", "null"]
        repositoryId:
          type: ["integer", "null"]
        type:
          type: string
        actorLogin:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time

    EventInput:
      type: object
      required: [type]
      properties:
        teamId:
          type: integer
        repositoryId:
          type: integer
        type:
          type: string
          minLength: 1
        actorLogin:
          type: string
        metadata:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time

    # ── Analytics ─────────────────────────────────────────────────────────
    MetricsSummary:
      type: object
      required: [totalDeployments, successRate, avgLeadTimeDays, avgCycleTimeDays, openIncidents, totalPullRequests, doraRating]
      properties:
        totalDeployments:
          type: integer
        successRate:
          type: number
        avgLeadTimeDays:
          type: number
        avgCycleTimeDays:
          type: number
        openIncidents:
          type: integer
        totalPullRequests:
          type: integer
        mergedPullRequests:
          type: integer
        doraRating:
          type: string
          enum: [elite, high, medium, low]
        deploymentsPerDay:
          type: number
        changeFailureRate:
          type: number
        avgRecoveryTimeHours:
          type: number

    DoraMetrics:
      type: object
      required: [deploymentFrequency, leadTimeForChanges, changeFailureRate, meanTimeToRecovery]
      properties:
        deploymentFrequency:
          $ref: "#/components/schemas/DoraMetric"
        leadTimeForChanges:
          $ref: "#/components/schemas/DoraMetric"
        changeFailureRate:
          $ref: "#/components/schemas/DoraMetric"
        meanTimeToRecovery:
          $ref: "#/components/schemas/DoraMetric"

    DoraMetric:
      type: object
      required: [value, unit, rating, trend]
      properties:
        value:
          type: number
        unit:
          type: string
        rating:
          type: string
          enum: [elite, high, medium, low]
        trend:
          type: number
        trendDirection:
          type: string
          enum: [up, down, flat]

    TimeseriesPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
        value:
          type: number
        label:
          type: ["string", "null"]

    FlowMetrics:
      type: object
      required: [avgCycleTimeDays, medianCycleTimeDays, throughputPerWeek, wipCount, prMergeRate]
      properties:
        avgCycleTimeDays:
          type: number
        medianCycleTimeDays:
          type: number
        throughputPerWeek:
          type: number
        wipCount:
          type: integer
        prMergeRate:
          type: number
        avgPrSize:
          type: number
        reviewTurnaroundHours:
          type: number

    TeamHealthMetrics:
      type: object
      required: [teamId, teamName, healthScore, deploymentCount, prCount, incidentCount, avgCycleTimeDays]
      properties:
        teamId:
          type: integer
        teamName:
          type: string
        healthScore:
          type: number
        deploymentCount:
          type: integer
        prCount:
          type: integer
        incidentCount:
          type: integer
        avgCycleTimeDays:
          type: number
        doraRating:
          type: string
          enum: [elite, high, medium, low]

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [deployment, pull_request, incident, event]
        description:
          type: string
        teamName:
          type: ["string", "null"]
        repositoryName:
          type: ["string", "null"]
        actorLogin:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        severity:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      required: [rank, teamId, teamName, score, deploymentFrequency, leadTimeDays, changeFailureRate, recoveryTimeHours]
      properties:
        rank:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        score:
          type: number
        deploymentFrequency:
          type: number
        leadTimeDays:
          type: number
        changeFailureRate:
          type: number
        recoveryTimeHours:
          type: number
        doraRating:
          type: string
          enum: [elite, high, medium, low]
